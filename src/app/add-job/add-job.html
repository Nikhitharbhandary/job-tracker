<app-dashboard-header/>


<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-5 form_container mt-5 py-3">
            <div class="heading_container text-center">
                <h2 class="heading">Add Job</h2>
            </div>
            <div class="form-group row">
                <label for="" class="col-4"> Company name : </label>
                <div class="col-8">
                    <input type="text" class="form-control" [(ngModel)]="job.cname" #cnameinput name="cname" id="">
                </div>
            </div>
            <div class="form-group row">
                <label for="" class="col-4"> Job Role : </label>
                <div class="col-8">
                    <input type="text" class="form-control" [(ngModel)]="job.role" #roleinput name="role" id="">
                </div>
            </div>
            <div class="form-group row">
                <label for="" class="col-4"> Status : </label>
                <div class="col-8">
                    <select class="form-select" [(ngModel)]="job.status"  name="status" #statusinput id="">
                    <option value="Applied">Applied</option>
                    <option value="Interview">Interview</option>
                    <option value="Offer Received">Offer Received</option>
                    <option value="Rejected">Rejected</option>
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label for="" class="col-4"> Location : </label>
                <div class="col-8">
                    <input type="text" class="form-control" [(ngModel)]="job.location" #locationinput name="location" id="">
                </div>
            </div>
            <div class="form-group row">
                <label for="" class="col-4"> Date : </label>
                <div class="col-8">
                    <input type="date" class="form-control" [(ngModel)]="job.applied_date" name="applied_date" id="">
                </div>
            </div>
            <div class="form-group row">
                <label for="" class="col-4"> Note : </label>
                <div class="col-8">
                    <textarea class="form-control" [(ngModel)]="job.note" name="note" id=""></textarea>
                </div>
            </div>
            <div class="form-group d-flex justify-content-evenly py-2 mt-2 border-top">
                <button type="button" (click)="addProduct()" class="btn form_button">{{ editmode ? 'Update' : 'Save' }}</button>
                 <button class="btn form_button" (click)="delete_product()" [disabled]="!editmode"> Delete</button>
                <button type="reset" (click)="clearfunction()" class="btn form_button"> Clear</button>
                <button class="btn form_button" (click)="view_jobs()"> View jobs</button>
            </div>
        </div>
    </div>
</div>




<div class="form-group d-flex justify-content-center">

</div>

 <app-footer/>
